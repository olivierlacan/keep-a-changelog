name: Accessibility

# Builds the site and runs the axe-core audit (WCAG 2.1 A/AA + best-practice) of
# the 2.0 page across light/dark, desktop/mobile, and the pinned-header and
# open-picker states. Fails the build on any violation.

on:
  push:
    branches: [ "main", "2-0-0" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: bundle exec middleman build

      - name: Run axe accessibility audit
        # The Playwright config serves ./build and the spec audits /en/2.0.0/.
        run: npx playwright test test/visual/a11y.spec.js --project=chromium
